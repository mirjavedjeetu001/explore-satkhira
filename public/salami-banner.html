<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salami Banner</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Hind Siliguri', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #333;
            padding: 20px;
        }
        
        .banner {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #0d4f1c 0%, #1a7a32 30%, #28a745 60%, #1a7a32 100%);
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        
        /* Decorative elements */
        .moon {
            position: absolute;
            top: 30px;
            right: 80px;
            font-size: 120px;
            opacity: 0.9;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.6));
        }
        
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            color: #ffd700;
            opacity: 0.8;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }
        
        .star-1 { top: 15%; left: 10%; font-size: 30px; }
        .star-2 { top: 25%; left: 25%; font-size: 20px; }
        .star-3 { top: 10%; left: 40%; font-size: 25px; }
        .star-4 { top: 30%; left: 75%; font-size: 22px; }
        .star-5 { top: 8%; left: 60%; font-size: 18px; }
        .star-6 { top: 20%; left: 85%; font-size: 28px; }
        
        /* Floating coins */
        .coins {
            position: absolute;
            bottom: 0;
            right: 0;
            font-size: 80px;
            opacity: 0.3;
        }
        
        .coin-1 { position: absolute; bottom: 100px; right: 50px; }
        .coin-2 { position: absolute; bottom: 180px; right: 150px; font-size: 60px; }
        .coin-3 { position: absolute; bottom: 50px; right: 200px; font-size: 50px; }
        
        /* Content */
        .content {
            position: relative;
            z-index: 10;
            padding: 60px 80px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .badge {
            display: inline-block;
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid #ffd700;
            color: #ffd700;
            padding: 8px 25px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 25px;
            width: fit-content;
        }
        
        .title {
            color: white;
            font-size: 72px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 25px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 28px;
            line-height: 1.6;
            max-width: 650px;
            margin-bottom: 35px;
        }
        
        .features {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .feature {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.15);
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            font-size: 18px;
        }
        
        .feature-icon {
            font-size: 24px;
        }
        
        .url-box {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 15px 30px;
            border-radius: 15px;
            width: fit-content;
        }
        
        .url-icon {
            font-size: 28px;
        }
        
        .url-text {
            color: #1a5f2a;
            font-size: 24px;
            font-weight: 700;
        }
        
        /* Logo area */
        .logo-area {
            position: absolute;
            bottom: 40px;
            right: 60px;
            text-align: right;
        }
        
        .logo-text {
            color: rgba(255,255,255,0.9);
            font-size: 24px;
            font-weight: 600;
        }
        
        .logo-sub {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        
        /* Decorative circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
        }
        
        .circle-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -100px;
        }
        
        .circle-2 {
            width: 300px;
            height: 300px;
            bottom: -150px;
            left: -100px;
        }
        
        /* Pattern overlay */
        .pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="banner">
        <!-- Pattern overlay -->
        <div class="pattern"></div>
        
        <!-- Decorative circles -->
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        
        <!-- Stars -->
        <div class="stars">
            <span class="star star-1">⭐</span>
            <span class="star star-2">✨</span>
            <span class="star star-3">⭐</span>
            <span class="star star-4">✨</span>
            <span class="star star-5">⭐</span>
            <span class="star star-6">✨</span>
        </div>
        
        <!-- Moon -->
        <div class="moon">🌙</div>
        
        <!-- Floating coins -->
        <div class="coins">
            <div class="coin-1">💰</div>
            <div class="coin-2">💵</div>
            <div class="coin-3">🪙</div>
        </div>
        
        <!-- Content -->
        <div class="content">
            <div class="badge">🎉 নতুন ফিচার</div>
            <h1 class="title">ঈদ সালামি<br>ক্যালকুলেটর</h1>
            <p class="subtitle">ছোটবেলায় সালামি গুনতাম হাতে, এখন গুনুন স্মার্টভাবে! কে কত দিলো সব হিসাব রাখুন সহজেই।</p>
            
            <div class="features">
                <div class="feature">
                    <span class="feature-icon">✅</span>
                    <span>লগইন ছাড়াই</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">💾</span>
                    <span>ডাটা সেভ থাকে</span>
                </div>
                <div class="feature">
                    <span class="feature-icon">📱</span>
                    <span>মোবাইল ফ্রেন্ডলি</span>
                </div>
            </div>
            
            <div class="url-box">
                <span class="url-icon">🔗</span>
                <span class="url-text">exploresatkhira.com/salami</span>
            </div>
        </div>
        
        <!-- Logo -->
        <div class="logo-area">
            <div class="logo-text">Explore Satkhira</div>
            <div class="logo-sub">এক্সপ্লোর সাতক্ষীরা</div>
        </div>
    </div>
</body>
</html>
